services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      args:
        INSTALLER: ${INSTALLER:-pip}
    image: ai-testcase-generator:${IMAGE_TAG:-local}
    env_file:
      - .env.runtime
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ${APP_DATA_MOUNT:-app-data}:/app/data
      - ${MODEL_CACHE_MOUNT:-app-model-cache}:/app/.model_cache/huggingface
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  worker:
    build:
      context: .
      args:
        INSTALLER: ${INSTALLER:-pip}
    image: ai-testcase-generator:${IMAGE_TAG:-local}
    env_file:
      - .env.runtime
    command:
      [
        "sh",
        "-c",
        "python scripts/check_runtime_paths.py && exec python scripts/run_generation_worker.py",
      ]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${APP_DATA_MOUNT:-app-data}:/app/data
      - ${MODEL_CACHE_MOUNT:-app-model-cache}:/app/.model_cache/huggingface
    restart: unless-stopped
    healthcheck:
      disable: true

  mysql:
    image: mysql:8.0
    profiles:
      - mysql
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
      ]
    env_file:
      - .env.runtime
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-replace-with-strong-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agent}
      MYSQL_USER: ${MYSQL_USER:-agent_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-your_agent_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations/mysql/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent",
        ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10

volumes:
  redis-data:
  mysql-data:
  app-data:
  app-model-cache:
  smoke-data:
  smoke-model-cache:
