services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: ${REQUIREMENTS_FILE:-requirements.txt}
        INSTALL_ML_DEPS: ${INSTALL_ML_DEPS:-false}
        INSTALLER: ${INSTALLER:-pip}
    image: ai-testcase-generator:${IMAGE_TAG:-local}
    env_file:
      - .env.runtime
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./.model_cache/huggingface:/app/.model_cache/huggingface
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  worker:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: ${REQUIREMENTS_FILE:-requirements.txt}
        INSTALL_ML_DEPS: ${INSTALL_ML_DEPS:-false}
        INSTALLER: ${INSTALLER:-pip}
    image: ai-testcase-generator:${IMAGE_TAG:-local}
    env_file:
      - .env.runtime
    command:
      [
        "sh",
        "-c",
        "python scripts/check_runtime_paths.py && exec python scripts/run_generation_worker.py",
      ]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./.model_cache/huggingface:/app/.model_cache/huggingface
    restart: unless-stopped
    healthcheck:
      disable: true

volumes:
  redis-data:
