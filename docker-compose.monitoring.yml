services:
  ai-testcase-metrics-proxy:
    image: ai-testcase-generator:${IMAGE_TAG:-local}
    env_file:
      - .env.runtime
    command:
      [
        "python",
        "scripts/run_metrics_proxy.py",
        "--host",
        "0.0.0.0",
        "--port",
        "9100",
        "--upstream-url",
        "http://api:8000/api/v1/operations/metrics/prometheus",
      ]
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "9100"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--storage.tsdb.path=/prometheus",
      ]
    depends_on:
      ai-testcase-metrics-proxy:
        condition: service_healthy
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./docs/monitoring/prometheus-scrape-example.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/monitoring/prometheus-alert-rules.yml:/etc/prometheus/prometheus-alert-rules.yml:ro
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      [
        "--config.file=/etc/alertmanager/alertmanager.yml",
        "--storage.path=/alertmanager",
      ]
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - ./docs/monitoring/alertmanager-route-example.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
