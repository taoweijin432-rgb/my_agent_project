name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_llm_smoke:
        description: "Run real LLM strong-gate smoke with GitHub Secrets"
        required: false
        default: false
        type: boolean

jobs:
  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    env:
      APP_API_KEY: ci-service-key
      ZHIPU_API_KEY: ci-zhipu-placeholder
      EMBEDDING_PROVIDER: hash
      CHROMA_PATH: data/chroma-ci
      CHROMA_COLLECTION: ci_test_knowledge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python lint
        run: python -m ruff check app scripts tests

      - name: Run deterministic release checks
        run: python scripts/run_release_checks.py

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  llm-smoke:
    name: Real LLM strong-gate smoke
    runs-on: ubuntu-latest
    needs:
      - release-checks
      - frontend-build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_llm_smoke }}
    env:
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check required secrets
        run: |
          test -n "$ZHIPU_API_KEY"

      - name: Run real LLM smoke
        run: python scripts/run_release_checks.py --skip-pytest --skip-diff-check --include-llm-smoke
